name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Commit CHANGELOG.md to main
        run: |
          npm run changelog
          if [ -n "$(git status --porcelain CHANGELOG.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            cp CHANGELOG.md /tmp/CHANGELOG.md
            cp RELEASENOTES.md /tmp/RELEASENOTES.md
            
            # Clean up and switch to main
            git reset --hard
            git fetch origin main
            git checkout main
            
            # Update changelog and commit
            cp /tmp/CHANGELOG.md CHANGELOG.md
            git add CHANGELOG.md
            git commit -m "docs: update CHANGELOG for ${GITHUB_REF_NAME}"
            git push origin main
          fi

      - name: Ensure RELEASENOTES.md exists for release
        run: |
          # Make sure we have the latest release notes
          npm run changelog
          # Don't return to tag - stay on main for build step

      - name: Build renderer
        run: npm run build:renderer

      - name: Build, sign, notarize, and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish always
