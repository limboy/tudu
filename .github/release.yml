changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - octocat
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🏗️ Maintenance
      labels:
        - chore
        - refactor
        - dependencies
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: 🧪 Tests
      labels:
        - test
    - title: 🏠 Internal
      labels:
        - internal
    - title: 🚧 Other Changes
      labels:
        - "*"
