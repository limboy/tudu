name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate CHANGELOG.md and RELEASENOTES.md
        run: npm run changelog

      - name: Commit CHANGELOG.md to main
        run: |
          cp RELEASENOTES.md /tmp/RELEASENOTES.md
          if [ -n "$(git status --porcelain CHANGELOG.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            cp CHANGELOG.md /tmp/CHANGELOG.md
            git checkout -- CHANGELOG.md RELEASENOTES.md
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/CHANGELOG.md CHANGELOG.md
            git add CHANGELOG.md
            git commit -m "docs: update CHANGELOG for ${GITHUB_REF_NAME}" && git push origin main || true
            git checkout ${GITHUB_REF_NAME}
          fi
          cp /tmp/RELEASENOTES.md RELEASENOTES.md

      - name: Build renderer
        run: npm run build:renderer

      - name: Build, sign, notarize, and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish always
