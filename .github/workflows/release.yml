name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Commit CHANGELOG.md to main
        run: |
          npm run changelog
          if [ -n "$(git status --porcelain CHANGELOG.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            cp CHANGELOG.md /tmp/CHANGELOG.md
            cp RELEASENOTES.md /tmp/RELEASENOTES.md
            
            # Clean up and switch to main
            git reset --hard
            git fetch origin main
            git checkout main
            
            # Update changelog and commit
            cp /tmp/CHANGELOG.md CHANGELOG.md
            git add CHANGELOG.md
            git commit -m "docs: update CHANGELOG for ${GITHUB_REF_NAME}"
            git push origin main
          fi

      - name: Generate release notes for build
        run: |
          # Generate fresh release notes - must be on a branch for git log to work correctly
          # If we're in detached HEAD, switch to main first
          if git rev-parse --abbrev-ref HEAD | grep -q detached; then
            git fetch origin main
            git checkout main
          fi
          npm run changelog
          # Verify the file was created and has content
          test -s RELEASENOTES.md || exit 1
          echo "Release notes generated successfully"

      - name: Build renderer
        run: npm run build:renderer

      - name: Build, sign, notarize, and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish always

      - name: Update GitHub release notes
        run: |
          RELEASE_NOTES=$(cat RELEASENOTES.md)
          gh release edit ${GITHUB_REF_NAME} --notes "$RELEASE_NOTES" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
